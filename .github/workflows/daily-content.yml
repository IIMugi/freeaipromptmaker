name: Manual content draft

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository without write credentials
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate an unpublished review draft
        env:
          CONTENT_DRAFT_OUTPUT: work/content-drafts/manual-draft.mdx
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_API_KEY_6: ${{ secrets.GEMINI_API_KEY_6 }}
          GEMINI_API_KEY_7: ${{ secrets.GEMINI_API_KEY_7 }}
          GEMINI_API_KEY_8: ${{ secrets.GEMINI_API_KEY_8 }}
          GEMINI_API_KEY_9: ${{ secrets.GEMINI_API_KEY_9 }}
          GEMINI_API_KEY_10: ${{ secrets.GEMINI_API_KEY_10 }}
        run: npm run daily-content

      - name: Upload draft for editorial review
        uses: actions/upload-artifact@v4
        with:
          name: unpublished-content-draft
          path: work/content-drafts/manual-draft.mdx
          if-no-files-found: error
          retention-days: 7
